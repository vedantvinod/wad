<!DOCTYPE html>
<html>
<head>
    <title>User Registration</title>

    <style>

        body{
            font-family: Arial;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container{
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2{
            text-align: center;
            margin-bottom: 20px;
        }

        input{
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        button{
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            border: none;
            background: blue;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: darkblue;
        }

        #message{
            text-align: center;
            color: green;
            margin-top: 10px;
        }

    </style>
</head>

<body>

    <div class="container">

        <h2>User Registration</h2>

        <form id="registerForm">

            <input type="text" id="name" placeholder="Enter Name">

            <input type="email" id="email" placeholder="Enter Email">

            <input type="password" id="password" placeholder="Enter Password">

            <button type="submit">Register</button>

        </form>

        <p id="message"></p>

    </div>

    <script src="script.js"></script>

</body>
</html>
