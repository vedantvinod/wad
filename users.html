<!DOCTYPE html>
<html>
<head>
    <title>User List</title>

    <style>

        body{
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2{
            text-align: center;
        }

        table{
            width: 80%;
            margin: auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0px 0px 10px gray;
        }

        th, td{
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th{
            background: blue;
            color: white;
        }

        tr:hover{
            background: #f1f1f1;
        }

        .deleteBtn{
            background: red;
            color: white;
            border: none;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .deleteBtn:hover{
            background: darkred;
        }

    </style>
</head>

<body>

    <h2>Registered Users</h2>

    <table>

        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Password</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="tableBody">

        </tbody>

    </table>

    <script>

        let users = JSON.parse(localStorage.getItem("users")) || [];

        let tableBody = document.getElementById("tableBody");

        function displayUsers(){

            tableBody.innerHTML = "";

            users.forEach((user, index) => {

                tableBody.innerHTML += `
                    <tr>
                        <td>${user.name}</td>
                        <td>${user.email}</td>
                        <td>${user.password}</td>

                        <td>
                            <button class="deleteBtn"
                            onclick="deleteUser(${index})">
                            Delete
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        displayUsers();

        function deleteUser(index){

            users.splice(index, 1);

            localStorage.setItem("users",
            JSON.stringify(users));

            displayUsers();
        }

    </script>

</body>
</html>
